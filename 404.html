<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Calcaterra</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<meta name="robots" content="noindex, nofollow">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:#141210;color:#f2efe9;font-family:'Times New Roman',Times,serif;overflow:hidden;display:flex;flex-direction:column;}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:500;height:96px;display:flex;justify-content:space-between;align-items:center;padding:18px 52px;border-bottom:1px solid rgba(242,239,233,0.05);}
.nav-logo-img{height:52px;width:auto;display:block;filter:invert(1) brightness(0.5);margin-top:4px;}

/* GRAIN */
.grain{position:fixed;inset:0;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:0.5;pointer-events:none;}

/* VERTICAL LINE */
.v-line{position:fixed;left:52px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent 0%,rgba(242,239,233,0.05) 30%,rgba(242,239,233,0.05) 70%,transparent 100%);z-index:1;}

/* MAIN */
.container{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 52px 0 130px;max-width:1100px;}

/* 404 NUMBER */
.four-wrap{position:fixed;right:-60px;top:50%;transform:translateY(-52%);z-index:1;pointer-events:none;user-select:none;}
.four-num{font-family:'Times New Roman',Times,serif;font-size:clamp(260px,38vw,560px);font-weight:300;line-height:1;color:rgba(242,239,233,0.03);letter-spacing:-0.04em;}

/* CONTENT */
.eyebrow{font-family:'Montserrat',sans-serif;font-size:8px;font-weight:300;letter-spacing:0.72em;color:rgba(242,239,233,0.2);display:block;margin-bottom:36px;opacity:0;animation:fadeUp .9s ease .1s forwards;}
.heading{font-size:clamp(44px,7vw,96px);font-weight:300;line-height:1.0;letter-spacing:0.02em;color:#f2efe9;margin-bottom:0;opacity:0;animation:fadeUp .9s ease .2s forwards;}
.heading em{font-style:italic;color:rgba(242,239,233,0.25);}
.divider{width:56px;height:1px;background:rgba(242,239,233,0.12);margin:44px 0;opacity:0;animation:fadeUp .9s ease .3s forwards;}
.sub{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:300;letter-spacing:0.08em;line-height:2;color:rgba(242,239,233,0.35);max-width:440px;margin-bottom:56px;opacity:0;animation:fadeUp .9s ease .35s forwards;}
.sub strong{color:rgba(242,239,233,0.55);font-weight:300;}

/* LINKS */
.links{display:flex;flex-direction:column;gap:2px;opacity:0;animation:fadeUp .9s ease .45s forwards;}
.link-row{display:flex;align-items:center;gap:0;}
.link-label{font-family:'Montserrat',sans-serif;font-size:7px;font-weight:400;letter-spacing:0.5em;color:rgba(242,239,233,0.2);width:130px;flex-shrink:0;}
.link-item{font-family:'Times New Roman',Times,serif;font-size:clamp(18px,2.2vw,26px);font-weight:300;color:rgba(242,239,233,0.45);text-decoration:none;letter-spacing:0.02em;padding:16px 24px;border:1px solid transparent;transition:color .25s,border-color .25s,background .25s;display:block;}
.link-item:hover{color:#f2efe9;border-color:rgba(242,239,233,0.1);background:rgba(242,239,233,0.03);}
.link-item em{font-style:italic;color:rgba(242,239,233,0.2);transition:color .25s;}
.link-item:hover em{color:rgba(242,239,233,0.4);}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

@media(max-width:860px){
  #nav{padding:0 24px;}
  .v-line{left:24px;}
  .container{padding:0 24px 0 24px;}
  .four-wrap{right:-40px;}
  .link-label{display:none;}
  .link-item{padding:14px 0;}
}
@media(max-width:600px){
  .four-num{font-size:220px;}
}
</style>
</head>
<body>

<div class="grain"></div>
<div class="v-line"></div>

<nav id="nav">
  <a href="/">
    <img class="nav-logo-img" src="https://cdn.shopify.com/s/files/1/0994/8715/4470/files/Untitled_design-2_34f672e4-1bf2-4955-a64b-25af3090d31a.png?v=1773510117" alt="Calcaterra"/>
  </a>
</nav>

<div class="four-wrap">
  <span class="four-num">404</span>
</div>

<div class="container">
  <span class="eyebrow">PAGE NOT FOUND</span>
  <h1 class="heading">Nothing<br><em>here.</em></h1>
  <div class="divider"></div>
  <p class="sub">This page was never made. <strong>Everything we have made was made once, made deliberately, and it is still here.</strong></p>

  <div class="links">
    <div class="link-row">
      <span class="link-label">START HERE</span>
      <a href="/" class="link-item">Home<em>.</em></a>
    </div>
    <div class="link-row">
      <span class="link-label">THE WATCH</span>
      <a href="/collections/roma" class="link-item">The Roma<em>.</em></a>
    </div>
    <div class="link-row">
      <span class="link-label">THE HOUSE</span>
      <a href="/about" class="link-item">Our Story<em>.</em></a>
    </div>
    <div class="link-row">
      <span class="link-label">NEED HELP</span>
      <a href="/contact" class="link-item">Contact<em>.</em></a>
    </div>
  </div>
</div>

</body>
</html>
